<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Teams</title>
    <link rel="stylesheet" href="/index.css">
</head>
<body>

<h1>Football Teams</h1>

<!-- Системне повідомлення -->
<script>
    // Якщо повідомлення передано сервером, відобразимо його через alert
    const systemMessage = [[${message}]];
    if (systemMessage) {
        alert(systemMessage);
    }
</script>

<!-- Список команд -->
<div class="team-list">
    <!-- Блок команди -->
    <div th:each="team : ${teams}" class="team-block" th:data-id="${team.id}">
        <!-- Створюємо клікабельний блок -->
        <a th:onclick="|window.location.href='/team/${team.id}'|" class="team-block-link">
            <h3 th:text="${team.name}"></h3>
            <p><strong>Money:</strong> <span th:text="${team.money}"></span></p>
            <p><strong>Transfer commission:</strong> <span th:text="${team.percent}"></span></p>
        </a>
    </div>
</div>

<!-- Кнопки -->
<div class="button-container">
    <button class="cyan-button" onclick="window.location.href='/team/new'">Add Team</button>
    <button class="green-button" onclick="window.location.href='/player/free-agents'">Free Agents</button>
    <button class="orange-button" onclick="window.location.href='/player/new'">Add Player</button>
</div>

</body>
</html>
