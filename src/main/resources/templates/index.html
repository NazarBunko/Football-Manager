<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams</title>
    <link rel="stylesheet" href="/index.css">
</head>
<body>

<h1>Football Teams</h1>
<div class="team-list">
    <div class="team-block" th:each="team : ${teams}"
         th:data-id="${team.id}"
         th:data-name="${team.name}"
         onclick="redirectToPlayers(this)">
        <h3 th:text="${team.name}"></h3>
        <p><strong>Money:</strong> <span th:text="${team.money}"></span></p>
        <p><strong>Win %:</strong> <span th:text="${team.percent}"></span></p>
    </div>
</div>

<script>
    function redirectToPlayers(teamBlock) {
        const teamId = teamBlock.getAttribute('data-id');
        window.location.href = `/team/${teamId}/players`;
    }
</script>

</body>
</html>
