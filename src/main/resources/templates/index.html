<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams</title>
    <link rel="stylesheet" href="/index.css">
</head>
<body>

<h1>Football Teams</h1>

<!-- Системне повідомлення -->
<script>
    // Якщо повідомлення передано сервером, відобразимо його через alert
    const systemMessage = /*[[${message}]]*/ '';
    if (systemMessage) {
        alert(systemMessage);
    }
</script>

<!-- Список команд -->
<div class="team-list">
    <div class="team-block" th:each="team : ${teams}"
         th:data-id="${team.id}"
         th:data-name="${team.name}"
         onclick="redirectToPlayers(this)">
        <h3 th:text="${team.name}"></h3>
        <p><strong>Money:</strong> <span th:text="${team.money}"></span></p>
        <p><strong>Transfer commission:</strong> <span th:text="${team.percent}"></span></p>
    </div>
</div>

<div class="free-agents-button">
    <button onclick="window.location.href='/player/free-agents'">Free Agents</button>
</div>

<script>
    function redirectToPlayers(teamBlock) {
        const teamId = teamBlock.getAttribute('data-id');
        window.location.href = `/team/${teamId}`;
    }
</script>

</body>
</html>
