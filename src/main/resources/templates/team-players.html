<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Players of Team</title>
    <link rel="stylesheet" href="/team-player.css">
</head>
<body>

<h1>Players of Team: <span th:text="${team.name}"></span></h1>

<div class="team-info">
    <p><strong>Money:</strong> <span th:text="${team.money}"></span></p>
    <p><strong>Transfer Percent:</strong> <span th:text="${team.percent}"></span>%</p>
    <div class="btn-container">
        <!-- Кнопки для команди -->
        <a th:href="@{/team/delete/{id}(id=${team.id})}" class="btn btn-red">Delete Team</a>
        <a th:href="@{/team/update/{id}(id=${team.id})}" class="btn btn-cyan">Update Team</a>
    </div>
</div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Position</th>
        <th>Experience (Months)</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="player : ${players}">
        <td th:text="${player.id}"></td>
        <td th:text="${player.name}"></td>
        <td th:text="${player.age}"></td>
        <td th:text="${player.position}"></td>
        <td th:text="${player.experience}"></td>
        <td>
            <!-- Кнопки для гравців -->
            <a th:href="@{/player/delete/{id}(id=${player.id})}" class="btn btn-red">Delete</a>
            <a th:href="@{/player/release/{id}(id=${player.id})}" class="btn btn-blue">Release</a>
            <a th:href="@{/player/sell/{id}(id=${player.id})}" class="btn btn-green">Sell</a>
            <a th:href="@{/player/update/{id}(id=${player.id})}" class="btn btn-cyan">Update</a>
        </td>
    </tr>
    </tbody>
</table>

<div class="back-button">
    <button class="btn btn-blue" onclick="window.location.href='/'">Back to Teams</button>
</div>

</body>
</html>
