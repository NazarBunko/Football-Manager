<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Players of Team</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-4">
    <h1 class="text-center mb-4"><span th:text="${team.name}"></span></h1>

    <div class="card mb-4">
        <div class="card-body text-center">
            <h5 class="card-title">Team Info</h5>
            <p><strong>Money:</strong> <span th:text="${team.money}"></span></p>
            <p><strong>Transfer Percent:</strong> <span th:text="${team.percent}"></span>%</p>
            <div class="btn-group">
                <a th:href="@{/team/delete/{id}(id=${team.id})}" class="btn btn-danger">Delete Team</a>
                <a th:href="@{/team/update/{id}(id=${team.id})}" class="btn btn-info">Update Team</a>
            </div>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-striped">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Position</th>
                <th>Experience (Months)</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="player : ${players}">
                <td th:text="${player.id}"></td>
                <td th:text="${player.name}"></td>
                <td th:text="${player.age}"></td>
                <td th:text="${player.position}"></td>
                <td th:text="${player.experience}"></td>
                <td>
                    <a th:href="@{/player/delete/{id}(id=${player.id})}" class="btn btn-danger btn-sm">Delete</a>
                    <a th:href="@{/player/release/{id}(id=${player.id})}" class="btn btn-warning btn-sm">Release</a>
                    <a th:href="@{/player/sell/{id}(id=${player.id})}" class="btn btn-success btn-sm">Sell</a>
                    <a th:href="@{/player/update/{id}(id=${player.id})}" class="btn btn-primary btn-sm">Update</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="d-flex justify-content-center mt-4">
        <button class="btn btn-secondary" onclick="window.location.href='/'">Back to Teams</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
