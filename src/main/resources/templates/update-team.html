<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Team</title>
    <link rel="stylesheet" href="/update-team.css">
</head>
<body>

<div class="form-container">
    <h2>Update Team</h2>

    <form action="/team/update" method="post">
        <input type="hidden" name="id" th:value="${team.id}">

        <div class="form-group">
            <label for="name">Team Name</label>
            <input type="text" id="name" name="name" th:value="${team.name}" required>
        </div>

        <div class="form-group">
            <label for="money">Money</label>
            <input type="number" id="money" name="money" th:value="${team.money}" required>
        </div>

        <div class="form-group">
            <label for="percent">Percent</label>
            <input type="number" id="percent" name="percent" th:value="${team.percent}" step="0.01" required>
        </div>

        <button type="submit">Update</button>
    </form>

    <div class="back-link">
        <a href="/teams">Back to Teams</a>
    </div>
</div>

</body>
</html>
